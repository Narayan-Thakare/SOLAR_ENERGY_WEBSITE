.search-input {

.clear-btn {

<script>
    // Search Functionality
    function searchContent() {
    var input, filter, sections, li, clearBtn, noResultsMessage;
    input = document.getElementById('searchInput');
    filter = input.value.toUpperCase();
    sections = document.querySelectorAll('h1');
    li = document.querySelectorAll('li');
    clearBtn = document.getElementById('clearBtn');
    noResultsMessage = document.getElementById('noResultsMessage');

    // Show or hide the clear button based on the search input
    if (filter) {
        clearBtn.style.display = 'block';
    } else {
        clearBtn.style.display = 'none';
    }

    var hasVisibleItems = false;

    // Loop through all headings, and hide those who don't match the search query
    for (var i = 0; i < sections.length; i++) {
        var txtValue = sections[i].textContent || sections[i].innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
            sections[i].style.display = ''; // Show matching headings
            hasVisibleItems = true;
        } else {
            sections[i].style.display = 'none'; // Hide non-matching headings
        }
    }

    // Loop through all list items, and hide those who don't match the search query
    for (var j = 0; j < li.length; j++) {
        var txtValue = li[j].textContent || li[j].innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
            li[j].style.display = ''; // Show matching list items
            hasVisibleItems = true;
        } else {
            li[j].style.display = 'none'; // Hide non-matching list items
        }
    }

    // Show a 'No results found' message if no items are visible
    if (noResultsMessage) {
        if (filter && !hasVisibleItems) {
            noResultsMessage.style.display = 'block';
        } else {
            noResultsMessage.style.display = 'none';
        }
    }
}



    // Clear Search Input
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('clearBtn').style.display = 'none';
        searchContent(); // Re-run the search to reset the list
    }

    // Theme Toggle
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
    }

    // Dropdown Toggle
    function toggleDropdown() {
        var dropdownContent = document.getElementById('dropdownContent');
        dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
    }

    // Close dropdown if clicked outside
    window.onclick = function(event) {
    if (!event.target.matches('.dropdown-button')) {
        document.querySelectorAll('.dropdown-content').forEach(function(dropdown) {
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
            }
        });
    }
};

</script>

function generateMockQuestions() {
    const mockQuestionsContainer = document.getElementById('mockQuestions');
    mockQuestionsContainer.innerHTML = ''; // Clear previous content

    // Add a close button
    const closeButton = document.createElement('button');
    closeButton.className = 'close-btn';
    closeButton.innerText = '×';
    closeButton.onclick = function() {
        mockQuestionsContainer.innerHTML = ''; // Clear the mock questions when close button is clicked
    };
    mockQuestionsContainer.appendChild(closeButton);

    // Fisher-Yates shuffle algorithm for better shuffling
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    const shuffledQuestions = shuffle([...questions]).reverse(); // Shuffle and reverse the array
    const selectedQuestions = shuffledQuestions.slice(0, 10); // Get 10 random questions starting from the last

    selectedQuestions.forEach((qa, index) => {
        const questionElement = document.createElement('div');
        questionElement.innerHTML = `<strong>Q${index + 1}: ${qa.question}</strong>`;

        const answerWrapper = document.createElement('div'); // Wrapper for answer button and answer
        answerWrapper.className = 'answer-wrapper'; // Optional: Add a class for styling

        const answerButton = document.createElement('button');
        answerButton.className = 'answer-button';
        answerButton.innerText = 'Answer';
        answerButton.onclick = function() {
            const answerElement = this.nextElementSibling;
            answerElement.style.display = answerElement.style.display === 'block' ? 'none' : 'block';
        };

        const answerElement = document.createElement('div');
        answerElement.className = 'answer';
        answerElement.style.display = 'none'; // Hide answers by default
        answerElement.innerText = qa.answer;

        answerWrapper.appendChild(answerButton); // Append button to wrapper
        answerWrapper.appendChild(answerElement); // Append answer to wrapper

        questionElement.appendChild(answerWrapper); // Append wrapper to the question element

        mockQuestionsContainer.appendChild(questionElement);
    });
}

function toggleNestedDropdown(id) {

window.onclick = function(event) {
    if (!event.target.matches('.dropdown-button, .dropdown-button *, .operator-link, .operator-link *, .token-link, .token-link *, .variableInitilizationStatement-link , .variableInitilizationStatement-link *')) {
        closeAllDropdowns();
    }
};

function closeAllDropdowns() {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    for (var i = 0; i < dropdowns.length; i++) {
        dropdowns[i].style.display = "none";
    }

    var nestedDropdowns = document.getElementsByClassName("nested-dropdown-content");
    for (var j = 0; j < nestedDropdowns.length; j++) {
        nestedDropdowns[j].style.display = "none";
    }
}
