<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Voice Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none; /* Prevent resizing */
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s; /* Smooth transition */
        }

        button:hover {
            background-color: #218838;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #downloadLink {
            display: none; /* Initially hidden */
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text to Voice Converter</h1>
        <textarea id="textInput" rows="5" placeholder="Type your text here..."></textarea>
        <button id="convertButton">Convert to Voice</button>
        <select id="voiceSelect"></select>
        <div id="downloadLink">
            <a id="audioDownload" href="#" download="speech.mp3">Download Audio</a>
        </div>
    </div>
    <script>
        // Get the necessary DOM elements
        const textInput = document.getElementById("textInput");
        const convertButton = document.getElementById("convertButton");
        const voiceSelect = document.getElementById("voiceSelect");
        const audioDownload = document.getElementById("audioDownload");
        const downloadLink = document.getElementById("downloadLink");

        // Load available voices
        let voices = [];

        const loadVoices = () => {
            voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = ''; // Clear existing options

            voices.forEach((voice) => {
                const option = document.createElement("option");
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });
        };

        // Speak the text
        const speak = () => {
            const text = textInput.value;
            const selectedVoice = voiceSelect.value;

            if (text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = voices.find((voice) => voice.name === selectedVoice);
                
                // Optional: Adjust pitch and rate for more natural speech
                utterance.pitch = 1.2; // Range: 0 to 2
                utterance.rate = 1;    // Range: 0.1 to 10

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const mediaStreamDest = audioContext.createMediaStreamDestination();
                const source = audioContext.createMediaElementSource(new Audio());
                source.connect(mediaStreamDest);
                
                utterance.onstart = () => {
                    const audioElement = new Audio();
                    audioElement.src = 'data:audio/wav;base64,' + btoa(utterance.text);
                    audioElement.play();
                };
                
                utterance.onend = () => {
                    // Create a new audio blob and set it for download
                    audioContext.close().then(() => {
                        const blob = new Blob([utterance.text], { type: 'audio/wav' });
                        const url = URL.createObjectURL(blob);
                        audioDownload.href = url;
                        downloadLink.style.display = 'block'; // Show download link
                    });
                };

                speechSynthesis.speak(utterance);
            }
        };

        // Event listeners
        convertButton.addEventListener("click", speak);
        speechSynthesis.onvoiceschanged = loadVoices;
    </script>
</body>
</html>
